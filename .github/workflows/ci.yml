name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  formatting:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  lint-and-test:
    name: Lint and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features

  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - uses: actions/upload-artifact@v4
        with:
          name: mcserver-setup-${{ matrix.os }}
          path: target/release/mcserver-setup*
          if-no-files-found: error

  arch-linux:
    name: Arch Linux compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Compile and test in a clean Arch container
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work archlinux:latest bash -lc '
            pacman -Syu --noconfirm --needed rust cargo &&
            cargo build --release --locked &&
            cargo test --all-features'
